<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Builder - Edición Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #11111b; user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e2e; border-radius: 4px;}
        ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #585b70; }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="text-white font-sans" oncontextmenu="return false;">

    <!-- UI SUPERIOR: Economía e Info -->
    <div class="absolute top-0 left-0 w-full p-4 pointer-events-none flex justify-between items-start z-10">
        
        <!-- Estado del Jugador -->
        <div class="bg-gray-800/90 backdrop-blur-md p-4 rounded-xl border border-gray-700 shadow-lg pointer-events-auto flex flex-col gap-1 w-72">
            <h1 class="text-xl font-bold text-blue-400">Mega Factoría</h1>
            <div class="text-sm font-bold text-gray-300 flex items-center gap-2">
                <svg class="w-4 h-4 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                <span id="playerNameDisplay">Cargando...</span>
            </div>
            <div class="text-3xl font-mono text-green-400 font-bold tracking-tight mt-1">
                $<span id="moneyDisplay">0</span>
            </div>
            
            <div class="text-xs text-gray-400 mt-2 flex justify-between items-center bg-gray-900/50 p-2 rounded">
                <span>Mineros: <span id="genCountDisplay" class="font-bold text-white">0</span>/<span id="maxGenDisplay">3</span></span>
            </div>

            <div class="text-xs text-gray-400 mt-1 flex justify-between items-center bg-gray-900/50 p-2 rounded">
                <span>Terreno: <span id="gridSizeDisplay">5</span>x<span id="gridSizeDisplay2">5</span></span>
                <button id="btnExpand" class="bg-blue-600 hover:bg-blue-500 px-2 py-1 rounded text-white transition-colors shadow">
                    Expandir ($<span id="expandCostDisplay">500</span>)
                </button>
            </div>
            <div id="saveStatus" class="text-[10px] text-gray-500 text-right mt-1">Sincronizando...</div>
        </div>

        <!-- Botones de Menú -->
        <div class="pointer-events-auto flex gap-3">
            <button onclick="toggleLeaderboard()" class="bg-yellow-600/90 hover:bg-yellow-500/90 border border-yellow-400 px-6 py-3 rounded-xl shadow-lg font-bold flex flex-col items-center transition-colors">
                <span class="text-white">🏆 Clasificación</span>
            </button>
            <button onclick="toggleShop()" class="bg-purple-600/90 hover:bg-purple-500/90 border border-purple-400 px-6 py-3 rounded-xl shadow-lg font-bold flex flex-col items-center transition-colors">
                <span class="text-white">🛒 Abrir Tienda</span>
                <span class="text-purple-200 text-xs">Recetas y Mejoras</span>
            </button>
        </div>
    </div>

    <!-- TOAST NOTIFICATION (Alertas sin bloquear UI) -->
    <div id="toast" class="fixed bottom-36 left-1/2 -translate-x-1/2 bg-red-600/95 border border-red-400 text-white px-6 py-3 rounded-full font-bold shadow-2xl opacity-0 translate-y-4 transition-all duration-300 pointer-events-none z-50 text-sm">
        Mensaje
    </div>

    <!-- PANEL DERECHO: Inspector de Selección -->
    <div id="inspectorPanel" class="hidden absolute top-32 right-4 w-72 bg-gray-800/95 backdrop-blur-xl p-5 rounded-2xl border border-gray-600 shadow-2xl pointer-events-auto z-20 flex flex-col gap-4 transform transition-all">
        <div class="flex justify-between items-center border-b border-gray-600 pb-2">
            <h2 id="inspTitle" class="text-lg font-bold text-white">Máquina</h2>
            <button onclick="closeInspector()" class="text-gray-400 hover:text-white font-bold text-xl">&times;</button>
        </div>
        
        <div id="inspConfig" class="flex flex-col gap-2 max-h-64 overflow-y-auto pr-2">
            <!-- Generado por JS -->
        </div>

        <div class="grid grid-cols-2 gap-2 mt-2">
            <button onclick="rotateSelected()" class="bg-blue-600 hover:bg-blue-500 py-2 rounded-lg font-bold text-sm shadow">
                ↻ Rotar
            </button>
            <button onclick="deleteSelected()" class="bg-red-600 hover:bg-red-500 py-2 rounded-lg font-bold text-sm shadow flex justify-center items-center gap-1">
                Borrar
            </button>
        </div>
        <p class="text-[10px] text-center text-gray-400 mt-[-5px]">Recuperas el 50%</p>
    </div>

    <!-- UI INFERIOR: Inventario / Barra de Herramientas -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 pointer-events-auto z-10 w-max">
        <div class="bg-gray-900/95 backdrop-blur-xl px-4 py-3 rounded-2xl border border-gray-700 shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex items-end gap-2" id="toolbarContainer">
            
            <button onclick="setTool('cursor')" id="tool-cursor" class="tool-btn p-2 rounded-xl bg-gray-800 hover:bg-gray-700 border-2 border-blue-500 transition-all flex flex-col items-center w-20 h-20 justify-center">
                <span class="text-2xl mb-1">👆</span>
                <span class="text-[11px] font-bold text-gray-200">Seleccionar</span>
            </button>
            <div class="w-px h-16 bg-gray-700 mx-1"></div>
            
            <button onclick="setTool('conveyor')" id="tool-conveyor" class="tool-btn p-2 rounded-xl bg-gray-800 hover:bg-gray-700 border-2 border-transparent transition-all flex flex-col items-center w-16 h-20 justify-center relative group">
                <div class="w-8 h-8 bg-gray-600 mb-1 rounded flex items-center justify-center text-white font-bold">»</div>
                <span class="text-[10px] text-gray-300">Cinta</span>
                <div class="absolute -top-3 -right-2 bg-gray-900 px-1 py-0.5 rounded text-[10px] text-yellow-400 font-mono border border-gray-700">$10</div>
            </button>

            <!-- Nuevos Divisores -->
            <button onclick="setTool('splitter2')" id="tool-splitter2" class="tool-btn p-2 rounded-xl bg-gray-800 border-2 border-transparent transition-all flex flex-col items-center w-16 h-20 justify-center relative hidden">
                <div class="w-8 h-8 bg-indigo-500 mb-1 rounded border-2 border-indigo-300 flex items-center justify-center text-white font-bold text-xs leading-none text-center">1:2<br>Div</div>
                <span class="text-[10px] text-gray-300">Div 1/2</span>
                <div class="absolute -top-3 -right-2 bg-gray-900 px-1 py-0.5 rounded text-[10px] text-yellow-400 font-mono border border-gray-700">$150</div>
            </button>

            <button onclick="setTool('splitter3')" id="tool-splitter3" class="tool-btn p-2 rounded-xl bg-gray-800 border-2 border-transparent transition-all flex flex-col items-center w-16 h-20 justify-center relative hidden">
                <div class="w-8 h-8 bg-purple-600 mb-1 rounded border-2 border-purple-400 flex items-center justify-center text-white font-bold text-xs leading-none text-center">1:3<br>Div</div>
                <span class="text-[10px] text-gray-300">Div 1/3</span>
                <div class="absolute -top-3 -right-2 bg-gray-900 px-1 py-0.5 rounded text-[10px] text-yellow-400 font-mono border border-gray-700">$300</div>
            </button>

            <div class="w-px h-16 bg-gray-700 mx-1"></div>

            <button onclick="setTool('generator')" id="tool-generator" class="tool-btn p-2 rounded-xl bg-gray-800 hover:bg-gray-700 border-2 border-transparent transition-all flex flex-col items-center w-16 h-20 justify-center relative group">
                <div class="w-8 h-8 bg-green-500 mb-1 rounded border-2 border-green-300 flex items-center justify-center font-bold text-gray-900">M</div>
                <span class="text-[10px] text-gray-300">Minero</span>
                <div class="absolute -top-3 -right-2 bg-gray-900 px-1 py-0.5 rounded text-[10px] text-yellow-400 font-mono border border-gray-700">$50</div>
            </button>

            <button onclick="setTool('seller')" id="tool-seller" class="tool-btn p-2 rounded-xl bg-gray-800 hover:bg-gray-700 border-2 border-transparent transition-all flex flex-col items-center w-16 h-20 justify-center relative group">
                <div class="w-8 h-8 bg-red-500 mb-1 rounded border-2 border-red-300 flex items-center justify-center text-white font-bold">$</div>
                <span class="text-[10px] text-gray-300">Vendedor</span>
                <div class="absolute -top-3 -right-2 bg-gray-900 px-1 py-0.5 rounded text-[10px] text-yellow-400 font-mono border border-gray-700">$50</div>
            </button>

            <button onclick="setTool('smelter')" id="tool-smelter" class="tool-btn p-2 rounded-xl bg-gray-800 border-2 border-transparent transition-all flex flex-col items-center w-16 h-20 justify-center relative hidden">
                <div class="w-8 h-8 bg-orange-500 mb-1 rounded border-2 border-orange-300 flex items-center justify-center text-white font-bold text-xs">H</div>
                <span class="text-[10px] text-gray-300">Horno</span>
                <div class="absolute -top-3 -right-2 bg-gray-900 px-1 py-0.5 rounded text-[10px] text-yellow-400 font-mono border border-gray-700">$200</div>
            </button>

            <button onclick="setTool('crafter')" id="tool-crafter" class="tool-btn p-2 rounded-xl bg-gray-800 border-2 border-transparent transition-all flex flex-col items-center w-20 h-20 justify-center relative hidden">
                <div class="w-8 h-8 bg-fuchsia-500 mb-1 rounded border-2 border-fuchsia-300 flex items-center justify-center text-white font-bold text-xs">Ens</div>
                <span class="text-[10px] text-gray-300 leading-tight text-center">Ensamblador</span>
                <div class="absolute -top-3 -right-2 bg-gray-900 px-1 py-0.5 rounded text-[10px] text-yellow-400 font-mono border border-gray-700">$500</div>
            </button>
        </div>
    </div>

    <!-- MODAL: Tienda -->
    <div id="shopModal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center pointer-events-auto">
        <div class="bg-gray-900 border border-purple-500 rounded-2xl shadow-2xl w-3/4 max-w-5xl h-[85vh] flex flex-col">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center bg-gray-800 rounded-t-2xl">
                <h2 class="text-3xl font-bold text-purple-400">🛒 Centro de Investigación</h2>
                <div class="text-2xl font-mono text-green-400 font-bold bg-gray-900 px-4 py-1 rounded-lg border border-gray-700">
                    $<span id="shopMoney">0</span>
                </div>
                <button onclick="toggleShop()" class="text-gray-400 hover:text-white font-bold text-3xl">&times;</button>
            </div>
            <div class="p-4 flex gap-4 border-b border-gray-800 bg-gray-800/50">
                <button onclick="shopTab('buildings')" id="tab-buildings" class="px-4 py-2 rounded-lg bg-purple-600 font-bold shadow">Edificios y Mejoras</button>
                <button onclick="shopTab('recipes')" id="tab-recipes" class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 font-bold shadow">Recetas de Ensamblaje</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6" id="shopContent">
                <!-- Rellenado por JS -->
            </div>
        </div>
    </div>

    <!-- MODAL: Leaderboard -->
    <div id="leaderboardModal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center pointer-events-auto">
        <div class="bg-gray-900 border border-yellow-500 rounded-2xl shadow-2xl w-full max-w-xl h-[70vh] flex flex-col">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center bg-gray-800 rounded-t-2xl">
                <h2 class="text-2xl font-bold text-yellow-400">🏆 Clasificación Global</h2>
                <button onclick="toggleLeaderboard()" class="text-gray-400 hover:text-white font-bold text-3xl">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-2" id="leaderboardContent">
                <div class="text-center text-gray-400 mt-10">Cargando datos...</div>
            </div>
        </div>
    </div>

    <!-- Lienzo del Juego -->
    <canvas id="gameCanvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- DECODIFICAR USUARIO ---
        const urlParams = new URLSearchParams(window.location.search);
        const rawUser = urlParams.get('user') || urlParams.get('username') || btoa("Jugador Anonimo");
        let playerName = "Jugador Anonimo";
        try {
            let decoded = atob(rawUser);
            playerName = decoded.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        } catch(e) { console.warn("Error decodificando nombre", e); }
        document.getElementById('playerNameDisplay').innerText = playerName;

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAcMBMfWjiD4NHArV8lMWm7peIsyUKCW-w",
            authDomain: "growagarden-880f6.firebaseapp.com",
            projectId: "growagarden-880f6",
            storageBucket: "growagarden-880f6.firebasestorage.app",
            messagingSenderId: "179827921380",
            appId: "1:179827921380:web:512a931fa3ca411723b7f1",
            measurementId: "G-XTW0SDGGH1"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'default-factory-id';
        let currentUser = null;

        // --- CONSTANTES ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const TILE_SIZE = 64; 
        const ITEM_SPEED = 2.5; 
        
        // --- MATERIALES (Visuales y Valor Base) ---
        const MATS = {
            'ore_iron':    { name: 'Min. Hierro', color: '#9ca3af', shape: 'arc', value: 5 },
            'ore_copper':  { name: 'Min. Cobre', color: '#b45309', shape: 'arc', value: 6 },
            'ore_gold':    { name: 'Min. Oro', color: '#fbbf24', shape: 'arc', value: 15 },
            'ore_aluminum':{ name: 'Min. Aluminio', color: '#cbd5e1', shape: 'arc', value: 10 },
            'ore_silicon': { name: 'Silicio', color: '#14b8a6', shape: 'arc', value: 12 },
            'ore_diamond': { name: 'Diamante', color: '#67e8f9', shape: 'arc', value: 100 },
            
            'ingot_iron':  { name: 'Lingote Hierro', color: '#e5e7eb', shape: 'rect', value: 15 },
            'ingot_copper':{ name: 'Lingote Cobre', color: '#d97706', shape: 'rect', value: 18 },
            'ingot_gold':  { name: 'Lingote Oro', color: '#fcd34d', shape: 'rect', value: 45 },
            'ingot_aluminum':{ name: 'Lingote Aluminio', color: '#f1f5f9', shape: 'rect', value: 30 },
            'wafer_silicon':{ name: 'Oblea Silicio', color: '#2dd4bf', shape: 'rect', value: 40 },
            
            'wire':        { name: 'Cable', color: '#f59e0b', shape: 'coil', value: 25 },
            'plate':       { name: 'Placa Metálica', color: '#6b7280', shape: 'plate', value: 40 },
            'gear':        { name: 'Engranaje', color: '#4b5563', shape: 'gear', value: 70 },
            'pipe':        { name: 'Tubería', color: '#94a3b8', shape: 'pipe', value: 50 },
            
            'circuit':     { name: 'Circuito', color: '#10b981', shape: 'chip', value: 150 },
            'processor':   { name: 'Procesador', color: '#3b82f6', shape: 'chip', value: 450 },
            'motor':       { name: 'Motor', color: '#ef4444', shape: 'cylinder', value: 400 },
            'battery':     { name: 'Batería', color: '#a855f7', shape: 'cylinder', value: 350 },
            'supercomputer':{ name: 'Superordenador', color: '#ec4899', shape: 'chip', value: 2500 },
            'quantum_chip':{ name: 'Chip Cuántico', color: '#06b6d4', shape: 'chip', value: 6000 }
        };

        // --- RECETAS PROGRESIVAS ---
        const RECIPES = {
            // HORNOS
            'smelt_iron': { name: 'Fundir Hierro', in: {'ore_iron':1}, out: 'ingot_iron', time: 1.5, type: 'smelter', cost: 0, cat: 'Fundición' },
            'smelt_copper': { name: 'Fundir Cobre', in: {'ore_copper':1}, out: 'ingot_copper', time: 1.5, type: 'smelter', cost: 0, cat: 'Fundición' },
            'smelt_gold': { name: 'Fundir Oro', in: {'ore_gold':1}, out: 'ingot_gold', time: 2.0, type: 'smelter', cost: 300, cat: 'Fundición Avanzada' },
            'smelt_aluminum': { name: 'Fundir Aluminio', in: {'ore_aluminum':1}, out: 'ingot_aluminum', time: 2.0, type: 'smelter', cost: 400, cat: 'Fundición Avanzada' },
            'smelt_silicon': { name: 'Obleas de Silicio', in: {'ore_silicon':2}, out: 'wafer_silicon', time: 3.0, type: 'smelter', cost: 800, cat: 'Alta Tecnología' },
            
            // ENSAMBLADORES
            'craft_wire': { name: 'Cable de Cobre', in: {'ingot_copper':1}, out: 'wire', time: 1.0, type: 'crafter', cost: 100, cat: 'Componentes Básicos' },
            'craft_plate': { name: 'Placa de Hierro', in: {'ingot_iron':2}, out: 'plate', time: 1.5, type: 'crafter', cost: 150, cat: 'Componentes Básicos' },
            'craft_pipe': { name: 'Tubería', in: {'ingot_aluminum':1}, out: 'pipe', time: 1.5, type: 'crafter', cost: 400, cat: 'Mecánica' },
            'craft_gear': { name: 'Engranaje', in: {'ingot_iron':1, 'plate':1}, out: 'gear', time: 2.0, type: 'crafter', cost: 300, cat: 'Mecánica' },
            
            'craft_circuit': { name: 'Circuito Básico', in: {'wire':2, 'plate':1}, out: 'circuit', time: 2.5, type: 'crafter', cost: 800, cat: 'Electrónica' },
            'craft_battery': { name: 'Batería', in: {'wire':2, 'ingot_aluminum':2}, out: 'battery', time: 3.0, type: 'crafter', cost: 1200, cat: 'Electrónica' },
            'craft_motor': { name: 'Motor Industrial', in: {'gear':2, 'wire':3, 'pipe':1}, out: 'motor', time: 3.5, type: 'crafter', cost: 2500, cat: 'Mecánica Avanzada' },
            
            'craft_processor': { name: 'Procesador', in: {'circuit':2, 'wafer_silicon':1, 'ingot_gold':1}, out: 'processor', time: 4.0, type: 'crafter', cost: 4000, cat: 'Alta Tecnología' },
            'craft_supercomp': { name: 'Superordenador', in: {'processor':2, 'motor':1, 'battery':2}, out: 'supercomputer', time: 6.0, type: 'crafter', cost: 10000, cat: 'Alta Tecnología' },
            'craft_quantum': { name: 'Chip Cuántico', in: {'processor':4, 'ore_diamond':2, 'wafer_silicon':2}, out: 'quantum_chip', time: 10.0, type: 'crafter', cost: 50000, cat: 'Futurista' }
        };

        const BUILDINGS = {
            conveyor:  { cost: 10,  name: 'Cinta Transportadora' },
            generator: { cost: 50,  name: 'Minero / Generador' },
            seller:    { cost: 50,  name: 'Vendedor' },
            splitter2: { cost: 150, name: 'Divisor Doble (1 a 2)', shop: true, info: 'Alterna items hacia su izquierda y derecha.' },
            splitter3: { cost: 300, name: 'Divisor Triple (1 a 3)', shop: true, info: 'Alterna items hacia izq, frente y derecha.' },
            smelter:   { cost: 200, name: 'Horno de Fundición', shop: true, info: 'Funde minerales en lingotes.' },
            crafter:   { cost: 500, name: 'Ensamblador', shop: true, info: 'Combina items para crear objetos avanzados.' }
        };

        const DIRECTIONS = [
            { dx: 0, dy: -1, angle: -Math.PI / 2 }, // 0: Arriba
            { dx: 1, dy: 0,  angle: 0 },            // 1: Derecha
            { dx: 0, dy: 1,  angle: Math.PI / 2 },  // 2: Abajo
            { dx: -1, dy: 0, angle: Math.PI }       // 3: Izquierda
        ];

        // --- ESTADO DEL JUEGO ---
        let state = {
            money: 400,
            gridSize: 5,
            maxGenerators: 3, // Límite inicial
            map: {}, // key: "x,y", value: { type, dir, config, inventory, outBuffer, timer, splitIndex }
            items: [], 
            unlockedRecipes: ['smelt_iron', 'smelt_copper'],
            unlockedBuildings: ['conveyor', 'generator', 'seller'],
            tool: 'cursor',
            buildDir: 1
        };

        let selectedTile = null;
        let isDraggingPan = false;
        let isDraggingBuild = false;
        let lastBuiltGrid = null;
        let camera = { x: 0, y: 0, zoom: 1 };
        let lastSaveTime = 0;

        // Funciones Auxiliares
        function countGenerators() {
            let count = 0;
            for(let k in state.map) if(state.map[k].type === 'generator') count++;
            return count;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 3000);
        }

        // --- FIREBASE INICIALIZACIÓN ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (tokenError) {
                        console.warn("Token mismatch, usando Auth Anónimo para permitir guardado.", tokenError);
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { 
                console.error("Auth error", e); 
                document.getElementById('saveStatus').innerText = "Error Auth";
            }
        };

        initAuth();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadGameFromCloud();
                setupLeaderboardListener();
            }
        });

        async function saveGameToCloud() {
            if (!currentUser) return;
            try {
                const saveRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'saves', playerName);
                const mapObj = {};
                for (let [k, v] of Object.entries(state.map)) mapObj[k] = { ...v }; 

                await setDoc(saveRef, {
                    name: playerName,
                    money: state.money,
                    gridSize: state.gridSize,
                    maxGenerators: state.maxGenerators,
                    map: mapObj,
                    unlockedRecipes: state.unlockedRecipes,
                    unlockedBuildings: state.unlockedBuildings,
                    timestamp: Date.now()
                });
                document.getElementById('saveStatus').innerText = "Guardado ✅";
                setTimeout(() => document.getElementById('saveStatus').innerText = "", 2000);
            } catch(e) { console.error("Error saving:", e); }
        }

        async function loadGameFromCloud() {
            if (!currentUser) return;
            try {
                document.getElementById('saveStatus').innerText = "Cargando...";
                const saveRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'saves', playerName);
                const docSnap = await getDoc(saveRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    state.money = data.money;
                    state.gridSize = data.gridSize || 5;

                allSaves.slice(0, 50).forEach((save, index) => {

                    if(index === 0) medal = '🥇';
                    else if(index === 1) medal = '🥈';
                    else if(index === 2) medal = '🥉';
                    else medal = `<span class="text-gray-500 w-6 inline-block text-center">${index+1}</span>`;

                    const isMe = save.name === playerName;
                    const row = document.createElement('div');
                    row.className = `flex justify-between items-center p-3 mb-2 rounded-lg border ${isMe ? 'bg-yellow-900/40 border-yellow-500' : 'bg-gray-800 border-gray-700'}`;
                    row.innerHTML = `
                        <div class="flex items-center gap-3 font-bold text-lg">

                        </div>
                        <div class="text-green-400 font-mono font-bold text-xl">$${save.money.toLocaleString()}</div>
                    `;
                    lbContainer.appendChild(row);
                });
            }, (error) => console.error(error));
        }

        // --- ENTRADA (MOUSE) ---
        function getScreenToWorld(mx, my) {
            const worldX = (mx - canvas.width / 2) / camera.zoom + camera.x;
            const worldY = (my - canvas.height / 2) / camera.zoom + camera.y;
            return { worldX, worldY };
        }
        function getGridPos(wx, wy) {
            return { gx: Math.floor(wx / TILE_SIZE), gy: Math.floor(wy / TILE_SIZE) };
        }

        let dragStartPos = null;
        canvas.addEventListener('mousedown', (e) => {
            const { worldX, worldY } = getScreenToWorld(e.clientX, e.clientY);
            dragStartPos = { x: e.clientX, y: e.clientY };

            if (e.button === 2 || state.tool === 'cursor') {
                isDraggingPan = true;
            } else if (e.button === 0) {
                isDraggingBuild = true;
                lastBuiltGrid = null;
                buildAtMouse(e.clientX, e.clientY);
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isDraggingPan) {
                camera.x -= e.movementX / camera.zoom;
                camera.y -= e.movementY / camera.zoom;
            } else if (isDraggingBuild) {
                buildAtMouse(e.clientX, e.clientY);
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (isDraggingPan && state.tool === 'cursor' && e.button === 0) {
                const dx = e.clientX - dragStartPos.x;
                const dy = e.clientY - dragStartPos.y;
                if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
                    const w = getScreenToWorld(e.clientX, e.clientY);
                    const g = getGridPos(w.worldX, w.worldY);
                    selectTile(g.gx, g.gy);
                }
            }
            isDraggingPan = false;
            if(isDraggingBuild) saveGameToCloud(); 
            isDraggingBuild = false;
        });

        canvas.addEventListener('wheel', (e) => {
            const zoomSpeed = 0.1;
            const factor = e.deltaY > 0 ? 1 - zoomSpeed : 1 + zoomSpeed;
            const w = getScreenToWorld(e.clientX, e.clientY);
            camera.zoom = Math.max(0.2, Math.min(camera.zoom * factor, 3.0));
            camera.x = w.worldX - (e.clientX - canvas.width / 2) / camera.zoom;
            camera.y = w.worldY - (e.clientY - canvas.height / 2) / camera.zoom;
        });

        // --- LÓGICA DE CONSTRUCCIÓN ---
        function buildAtMouse(mx, my) {
            const { worldX, worldY } = getScreenToWorld(mx, my);
            const { gx, gy } = getGridPos(worldX, worldY);
            const key = `${gx},${gy}`;

            if (gx < 0 || gy < 0 || gx >= state.gridSize || gy >= state.gridSize) return;

            // Auto-dirección de cintas (o divisores)
            if ((state.tool === 'conveyor' || state.tool.startsWith('splitter')) && lastBuiltGrid) {
                if (lastBuiltGrid.gx !== gx || lastBuiltGrid.gy !== gy) {
                    const dx = gx - lastBuiltGrid.gx;
                    const dy = gy - lastBuiltGrid.gy;
                    if (Math.abs(dx) > Math.abs(dy)) state.buildDir = dx > 0 ? 1 : 3;
                    else state.buildDir = dy > 0 ? 2 : 0;
                }
            }

            const existing = state.map[key];
            if (existing && existing.type === state.tool && existing.dir === state.buildDir) {
                lastBuiltGrid = { gx, gy };
                return;
            }

            // Límite de Mineros
            if (state.tool === 'generator' && (!existing || existing.type !== 'generator')) {
                if (countGenerators() >= state.maxGenerators) {
                    showToast(`Límite máximo de mineros (${state.maxGenerators}) alcanzado.`);
                    return;
                }
            }

            const cost = BUILDINGS[state.tool].cost;
            if (state.money >= cost) {
                if (existing) refundBuilding(existing);
                
                state.money -= cost;
                
                let cfg = null;
                if (state.tool === 'generator') cfg = 'ore_iron';
                if (state.tool === 'smelter') cfg = state.unlockedRecipes.find(r => RECIPES[r].type === 'smelter') || 'smelt_iron';
                if (state.tool === 'crafter') cfg = state.unlockedRecipes.find(r => RECIPES[r].type === 'crafter') || 'craft_wire';

                state.map[key] = { 
                    type: state.tool, 
                    dir: state.buildDir, 
                    config: cfg, 
                    inventory: {}, 
                    outBuffer: null, 
                    timer: 0,
                    splitIndex: 0 // Para divisores
                };
                
                updateUI();
                lastBuiltGrid = { gx, gy };
            } else if (!isDraggingBuild) {
                showToast("Falta dinero para construir esto.");
            }
        }

        function refundBuilding(buildingData) {
            const refund = Math.floor(BUILDINGS[buildingData.type].cost * 0.5);
            state.money += refund;
        }

        // --- LÓGICA DE ACTUALIZACIÓN ---
        function isPosOccupiedByItem(x, y) {
            return state.items.some(i => (i.x === x && i.y === y && !i.moving) || (i.nx === x && i.ny === y));
        }

        function updateLogic(dt) {
            // 1. Procesar Máquinas
            for (let key in state.map) {
                const cell = state.map[key];
                const [gx, gy] = key.split(',').map(Number);

                if (cell.type === 'generator') {
                    cell.timer += dt;
                    let speed = 1.0;
                    if(cell.config === 'ore_diamond') speed = 4.0;
                    else if(cell.config === 'ore_gold' || cell.config === 'ore_silicon') speed = 2.0;

                    if (cell.timer >= speed) {
                        if (!isPosOccupiedByItem(gx, gy)) {
                            state.items.push({ type: cell.config, x: gx, y: gy, nx: gx, ny: gy, progress: 0, moving: false });
                            cell.timer = 0;
                        }
                    }
                } 
                else if (cell.type === 'smelter' || cell.type === 'crafter') {
                    const recipe = RECIPES[cell.config];
                    if (!recipe) continue;

                    if (cell.outBuffer && !isPosOccupiedByItem(gx, gy)) {
                        state.items.push({ type: cell.outBuffer, x: gx, y: gy, nx: gx, ny: gy, progress: 0, moving: false });
                        cell.outBuffer = null;
                        if(selectedTile === key) selectTile(gx, gy); 
                    }

                    if (!cell.outBuffer) {
                        let canCraft = true;
                        for (let reqMat in recipe.in) {
                            if ((cell.inventory[reqMat] || 0) < recipe.in[reqMat]) {
                                canCraft = false; break;
                            }
                        }

                        if (canCraft) {
                            cell.timer += dt;
                            if (cell.timer >= recipe.time) {
                                for (let reqMat in recipe.in) {
                                    cell.inventory[reqMat] -= recipe.in[reqMat];
                                }
                                cell.outBuffer = recipe.out;
                                cell.timer = 0;
                                if(selectedTile === key) selectTile(gx, gy); 
                            }
                        } else {
                            cell.timer = 0;
                        }
                    }
                }
            }

            // 2. Mover Objetos
            for (let i = state.items.length - 1; i >= 0; i--) {
                const item = state.items[i];

                if (!item.moving) {
                    const cell = state.map[`${item.x},${item.y}`];
                    
                    if (cell) {
                        if (cell.type === 'seller') {
                            const val = MATS[item.type]?.value || 0;
                            state.money += val;
                            state.items.splice(i, 1);
                            updateUI();
                            continue;
                        }

                        // Lógica de dirección (Cinta normal vs Divisores)
                        let pushDir = cell.dir;
                        let isSplitter = false;

                        if (cell.type === 'splitter2') {
                            isSplitter = true;
                            // Alterna entre Izquierda y Derecha (relativo a cell.dir)
                            const dirs = [(cell.dir + 3) % 4, (cell.dir + 1) % 4];
                            pushDir = dirs[(cell.splitIndex || 0) % 2];
                        } else if (cell.type === 'splitter3') {
                            isSplitter = true;
                            // Alterna entre Izquierda, Frente y Derecha
                            const dirs = [(cell.dir + 3) % 4, cell.dir, (cell.dir + 1) % 4];
                            pushDir = dirs[(cell.splitIndex || 0) % 3];
                        }

                        const nx = item.x + DIRECTIONS[pushDir].dx;
                        const ny = item.y + DIRECTIONS[pushDir].dy;
                        
                        if (nx >= 0 && nx < state.gridSize && ny >= 0 && ny < state.gridSize) {
                            const nextCell = state.map[`${nx},${ny}`];
                            let canMove = false;
                            let acceptedByMachine = false;

                            if (nextCell && !isPosOccupiedByItem(nx, ny)) {
                                if (nextCell.type === 'conveyor' || nextCell.type.startsWith('splitter') || nextCell.type === 'seller') {
                                    canMove = true;
                                } else if (nextCell.type === 'smelter' || nextCell.type === 'crafter') {
                                    const rec = RECIPES[nextCell.config];
                                    if (rec && rec.in[item.type]) {
                                        let currentAmt = nextCell.inventory[item.type] || 0;
                                        if (currentAmt < rec.in[item.type] * 2) {
                                            canMove = true;
                                            acceptedByMachine = true;
                                        }
                                    }
                                }
                            }

                            if (canMove) {
                                item.moving = true;
                                item.nx = nx;
                                item.ny = ny;
                                item.destMachine = acceptedByMachine ? `${nx},${ny}` : null;
                                
                                // Incrementar el divisor solo si se movió exitosamente
                                if (isSplitter) cell.splitIndex++; 
                            }
                        }
                    }
                } else {
                    item.progress += ITEM_SPEED * dt;
                    if (item.progress >= 1.0) {
                        item.x = item.nx;
                        item.y = item.ny;
                        item.progress = 0;
                        item.moving = false;

                        if (item.destMachine) {
                            const targetCell = state.map[item.destMachine];
                            if (targetCell) {
                                targetCell.inventory[item.type] = (targetCell.inventory[item.type] || 0) + 1;
                                state.items.splice(i, 1);
                                if (selectedTile === item.destMachine) {
                                    const [gx, gy] = item.destMachine.split(',').map(Number);
                                    selectTile(gx, gy);
                                }
                            }
                        }
                    }
                }
            }
        }

        // --- RENDERIZADO ---
        function drawShape(ctx, shape, size) {
            ctx.beginPath();
            const s = size * 0.4;
            if (shape === 'arc') {
                ctx.arc(0, 0, s, 0, Math.PI * 2);
            } else if (shape === 'rect') {
                ctx.rect(-s, -s*0.8, s*2, s*1.6);
            } else if (shape === 'chip') {
                ctx.rect(-s*0.8, -s*0.8, s*1.6, s*1.6);
                ctx.moveTo(-s, -s*0.5); ctx.lineTo(-s*0.8, -s*0.5);
                ctx.moveTo(-s, 0); ctx.lineTo(-s*0.8, 0);
                ctx.moveTo(-s, s*0.5); ctx.lineTo(-s*0.8, s*0.5);
                ctx.moveTo(s, -s*0.5); ctx.lineTo(s*0.8, -s*0.5);
                ctx.moveTo(s, 0); ctx.lineTo(s*0.8, 0);
                ctx.moveTo(s, s*0.5); ctx.lineTo(s*0.8, s*0.5);
            } else if (shape === 'coil') {
                ctx.arc(0, 0, s*0.8, 0, Math.PI*2);
                ctx.stroke(); ctx.beginPath();
                ctx.arc(0, 0, s*0.4, 0, Math.PI*2);
            } else if (shape === 'plate') {
                ctx.rect(-s, -s*0.4, s*2, s*0.8);
            } else if (shape === 'gear') {
                for(let i=0; i<8; i++) {
                    ctx.rotate(Math.PI/4);
                    ctx.rect(-s*0.2, -s, s*0.4, s*2);
                }
                ctx.fill(); ctx.beginPath(); ctx.fillStyle = '#11111b';
                ctx.arc(0,0, s*0.4, 0, Math.PI*2);
            } else if (shape === 'pipe') {
                ctx.rect(-s*0.2, -s, s*0.4, s*2);
            } else if (shape === 'cylinder') {
                ctx.rect(-s*0.6, -s, s*1.2, s*2);
            }
            ctx.fill();
            if(shape === 'chip' || shape === 'coil') ctx.stroke();
        }

        let mouseHoverX = -1; let mouseHoverY = -1;
        let animOffset = 0;

        function draw() {
            ctx.fillStyle = '#11111b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            // Suelo
            ctx.fillStyle = '#1e1e2e';
            ctx.fillRect(0, 0, state.gridSize * TILE_SIZE, state.gridSize * TILE_SIZE);

            // Rejilla
            ctx.strokeStyle = '#313244';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i <= state.gridSize; i++) {
                ctx.moveTo(i * TILE_SIZE, 0); ctx.lineTo(i * TILE_SIZE, state.gridSize * TILE_SIZE);
                ctx.moveTo(0, i * TILE_SIZE); ctx.lineTo(state.gridSize * TILE_SIZE, i * TILE_SIZE);
            }
            ctx.stroke();

            animOffset = (Date.now() / 30) % 20;

            // Edificios
            for (let key in state.map) {
                const cell = state.map[key];
                const [gx, gy] = key.split(',').map(Number);
                ctx.save();
                ctx.translate(gx * TILE_SIZE + TILE_SIZE/2, gy * TILE_SIZE + TILE_SIZE/2);

                if (selectedTile === key) {
                    ctx.shadowColor = '#89b4fa';
                    ctx.shadowBlur = 15;
                    ctx.strokeStyle = '#89b4fa';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(-TILE_SIZE/2, -TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
                    ctx.shadowBlur = 0;
                }

                if (cell.type === 'conveyor') {
                    ctx.fillStyle = '#313244';
                    ctx.fillRect(-TILE_SIZE/2, -TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
                    ctx.rotate(DIRECTIONS[cell.dir].angle);
                    
                    ctx.strokeStyle = '#585b70';
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    const arrowSize = 5;
                    for (let i = -1; i <= 3; i++) {
                        const x = (i * 20) + animOffset - TILE_SIZE/2;
                        if(x > -TILE_SIZE/2 && x < TILE_SIZE/2) {
                            let distance = Math.abs(x);
                            let opacity = (32 - distance) / 12; 
                            ctx.globalAlpha = Math.max(0, Math.min(1, opacity));

                            ctx.beginPath();
                            ctx.moveTo(x - arrowSize, -arrowSize);
                            ctx.lineTo(x, 0);
                            ctx.lineTo(x - arrowSize, arrowSize);
                            ctx.stroke();
                        }
                    }
                    ctx.globalAlpha = 1.0;

                } else if (cell.type === 'splitter2' || cell.type === 'splitter3') {
                    // Diseño Visual Divisores
                    ctx.fillStyle = cell.type === 'splitter2' ? '#4f46e5' : '#7e22ce'; // Indigo vs Purple
                    ctx.fillRect(-TILE_SIZE/2 + 2, -TILE_SIZE/2 + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    
                    ctx.rotate(DIRECTIONS[cell.dir].angle);
                    
                    // Flechas interiores
                    ctx.strokeStyle = '#c4b5fd';
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.beginPath();
                    
                    // Entrada centro
                    ctx.moveTo(-15, 0); ctx.lineTo(0, 0);
                    
                    if (cell.type === 'splitter2') {
                        // Derivan a Izq y Der
                        ctx.moveTo(0,0); ctx.lineTo(0, -15);
                        ctx.moveTo(0,0); ctx.lineTo(0, 15);
                        // Flechas
                        ctx.moveTo(-5, -10); ctx.lineTo(0, -15); ctx.lineTo(5, -10); // Arriba(Izq)
                        ctx.moveTo(-5, 10); ctx.lineTo(0, 15); ctx.lineTo(5, 10);    // Abajo(Der)
                    } else {
                        // Derivan a Izq, Frente y Der
                        ctx.moveTo(0,0); ctx.lineTo(0, -15);
                        ctx.moveTo(0,0); ctx.lineTo(15, 0);
                        ctx.moveTo(0,0); ctx.lineTo(0, 15);
                        // Flechas
                        ctx.moveTo(-5, -10); ctx.lineTo(0, -15); ctx.lineTo(5, -10); // Arriba(Izq)
                        ctx.moveTo(-5, 10); ctx.lineTo(0, 15); ctx.lineTo(5, 10);    // Abajo(Der)
                        ctx.moveTo(10, -5); ctx.lineTo(15, 0); ctx.lineTo(10, 5);    // Frente
                    }
                    ctx.stroke();

                } else if (cell.type === 'generator') {
                    ctx.fillStyle = '#a6e3a1';
                    ctx.fillRect(-TILE_SIZE/2 + 2, -TILE_SIZE/2 + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    ctx.fillStyle = '#11111b';
                    ctx.font = 'bold 24px font-mono'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('M', 0, 0);
                    ctx.rotate(DIRECTIONS[cell.dir].angle);
                    ctx.fillStyle = '#2e3440';
                    ctx.beginPath(); ctx.moveTo(18, -6); ctx.lineTo(28, 0); ctx.lineTo(18, 6); ctx.fill();
                } else if (cell.type === 'seller') {
                    ctx.fillStyle = '#f38ba8';
                    ctx.fillRect(-TILE_SIZE/2 + 2, -TILE_SIZE/2 + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    ctx.fillStyle = '#11111b'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('$', 0, 0);
                } else if (cell.type === 'smelter') {
                    ctx.fillStyle = '#fab387';
                    ctx.fillRect(-TILE_SIZE/2 + 2, -TILE_SIZE/2 + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    ctx.fillStyle = '#11111b'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('H', 0, -5);
                    if (cell.timer > 0 && RECIPES[cell.config]) {
                        let p = cell.timer / RECIPES[cell.config].time;
                        ctx.fillStyle = '#11111b'; ctx.fillRect(-15, 12, 30, 4);
                        ctx.fillStyle = '#a6e3a1'; ctx.fillRect(-15, 12, 30 * p, 4);
                    }
                    ctx.rotate(DIRECTIONS[cell.dir].angle);
                    ctx.fillStyle = '#2e3440';
                    ctx.beginPath(); ctx.moveTo(18, -6); ctx.lineTo(28, 0); ctx.lineTo(18, 6); ctx.fill();
                } else if (cell.type === 'crafter') {
                    ctx.fillStyle = '#d946ef';
                    ctx.fillRect(-TILE_SIZE/2 + 2, -TILE_SIZE/2 + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    ctx.fillStyle = '#11111b'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('Ens', 0, -5);
                    if (cell.timer > 0 && RECIPES[cell.config]) {
                        let p = cell.timer / RECIPES[cell.config].time;
                        ctx.fillStyle = '#11111b'; ctx.fillRect(-15, 14, 30, 4);
                        ctx.fillStyle = '#a6e3a1'; ctx.fillRect(-15, 14, 30 * p, 4);
                    }
                    ctx.rotate(DIRECTIONS[cell.dir].angle);
                    ctx.fillStyle = '#2e3440';
                    ctx.beginPath(); ctx.moveTo(18, -6); ctx.lineTo(28, 0); ctx.lineTo(18, 6); ctx.fill();
                }
                ctx.restore();
            }

            // Items
            state.items.forEach(item => {
                const drawX = (item.x + (item.nx - item.x) * item.progress) * TILE_SIZE + TILE_SIZE / 2;
                const drawY = (item.y + (item.ny - item.y) * item.progress) * TILE_SIZE + TILE_SIZE / 2;

                ctx.save();
                ctx.translate(drawX, drawY);
                
                const mInfo = MATS[item.type];
                if (mInfo) {
                    ctx.fillStyle = mInfo.color;
                    ctx.strokeStyle = '#11111b';
                    ctx.lineWidth = 1;
                    drawShape(ctx, mInfo.shape, TILE_SIZE);
                }
                ctx.restore();
            });

            // Fantasma Constructor
            if (mouseHoverX >= 0 && mouseHoverX < state.gridSize && mouseHoverY >= 0 && mouseHoverY < state.gridSize && state.tool !== 'cursor') {
                ctx.save();
                ctx.translate(mouseHoverX * TILE_SIZE + TILE_SIZE/2, mouseHoverY * TILE_SIZE + TILE_SIZE/2);
                ctx.globalAlpha = 0.4;

                let color = '#fff';
                if (state.tool === 'conveyor') color = '#89b4fa';
                if (state.tool === 'splitter2') color = '#4f46e5';
                if (state.tool === 'splitter3') color = '#7e22ce';
                if (state.tool === 'generator') color = '#a6e3a1';
                if (state.tool === 'seller') color = '#f38ba8';
                if (state.tool === 'smelter') color = '#fab387';
                if (state.tool === 'crafter') color = '#d946ef';
                
                ctx.fillStyle = color;
                ctx.fillRect(-TILE_SIZE/2, -TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
                
                ctx.rotate(DIRECTIONS[state.buildDir].angle);
                if (state.tool === 'conveyor') {
                    ctx.strokeStyle = '#11111b'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.beginPath(); ctx.moveTo(-5, -5); ctx.lineTo(0, 0); ctx.lineTo(-5, 5); ctx.moveTo(5, -5); ctx.lineTo(10, 0); ctx.lineTo(5, 5); ctx.stroke();
                } else if (state.tool.startsWith('splitter')) {
                    ctx.fillStyle = '#11111b'; ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = '#11111b'; ctx.beginPath(); ctx.moveTo(5, -10); ctx.lineTo(25, 0); ctx.lineTo(5, 10); ctx.fill();
                }
                
                ctx.restore();
            }

            ctx.restore();
        }

        canvas.addEventListener('mousemove', (e) => {
            const { worldX, worldY } = getScreenToWorld(e.clientX, e.clientY);
            const g = getGridPos(worldX, worldY);
            mouseHoverX = g.gx; mouseHoverY = g.gy;
        });

        let lastTime = 0;
        function loop(ts) {
            let dt = (ts - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1;
            lastTime = ts;

            updateLogic(dt);
            draw();
            requestAnimationFrame(loop);
        }

        updateUI();
        requestAnimationFrame((ts) => { lastTime = ts; loop(ts); });

    </script>
</body>
</html>
