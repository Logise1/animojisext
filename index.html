<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos :)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería para generar el código QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <style>
        /* Pequeña animación para el botón */
        .hover-scale {
            transition: transform 0.2s ease-in-out;
        }

        .hover-scale:hover {
            transform: translateY(-2px) scale(1.02);
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center font-sans antialiased p-4">

    <!-- Contenedor principal -->
    <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-8 w-full max-w-md">

        <!-- Título -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">
                Juegos <span class="text-indigo-500">:)</span>
            </h1>
            <p class="text-slate-500 mt-2 text-sm">Selecciona un juego para empezar</p>
        </div>

        <!-- Lista de juegos -->
        <div class="space-y-4">

            <!-- Enlace a Factory -->
            <a href="https://logise1.github.io/animojisext/factory" id="factory-link"
                class="hover-scale flex items-center justify-center w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold text-lg py-4 px-6 rounded-2xl shadow-md cursor-pointer text-decoration-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Factory
            </a>

        </div>
    </div>

    <!-- Botón Teléfono abajo a la derecha -->
    <button id="phone-btn"
        class="fixed bottom-6 right-6 bg-slate-800 hover:bg-slate-700 text-white font-medium py-3 px-5 rounded-full shadow-lg transition-colors flex items-center space-x-2 z-40">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
        </svg>
        <span>Teléfono</span>
    </button>

    <!-- Modal (Popup) del QR -->
    <div id="qr-modal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center max-w-sm w-full mx-4 relative">
            <!-- Botón de cerrar -->
            <button id="close-modal"
                class="absolute top-4 right-4 text-slate-400 hover:text-slate-700 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>

            <h2 class="text-2xl font-bold mb-2 text-slate-800">Conexión</h2>
            <p class="text-slate-500 text-sm mb-6 text-center">Escanea para sincronizar la sesión</p>

            <!-- Contenedor del QR -->
            <div class="bg-white border-2 border-slate-100 p-2 rounded-xl shadow-inner">
                <canvas id="qrcode"></canvas>
            </div>

            <p class="text-xs text-slate-400 mt-4 text-center">El código se actualiza automáticamente cada 3s.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Lógica original de la URL
            const link = document.getElementById('factory-link');
            const currentParams = window.location.search;

            if (currentParams) {
                if (link.href.includes('?')) {
                    link.href += '&' + currentParams.substring(1);
                } else {
                    link.href += currentParams;
                }
            }

            // --- LÓGICA DEL QR Y MODAL ---
            const modal = document.getElementById('qr-modal');
            const phoneBtn = document.getElementById('phone-btn');
            const closeBtn = document.getElementById('close-modal');
            let qrInterval;

            // Inicializar Qrious
            const qr = new QRious({
                element: document.getElementById('qrcode'),
                size: 200,
                level: 'M' // Nivel de corrección de errores (Medium)
            });

            // Función para actualizar el QR con timestamp y string de usuario
            function updateQR() {
                const timestamp = new Date().toISOString();
                const userString = navigator.userAgent; // String de usuario
                const urlParams = window.location.search || "Sin parámetros";

                // Formateamos los datos que irán dentro del QR
                const dataToEncode = `Time: ${timestamp} | Params: ${urlParams} | User: ${userString}`;

                // Actualizamos el QR
                qr.value = dataToEncode;
                console.log("QR Actualizado", new Date().toLocaleTimeString());
            }

            // Abrir Modal
            phoneBtn.addEventListener('click', () => {
                modal.classList.remove('hidden');
                modal.classList.add('flex'); // Usamos flex para centrar

                updateQR(); // Actualizamos inmediatamente al abrir
                qrInterval = setInterval(updateQR, 3000); // Repetir cada 3 segundos
            });

            // Cerrar Modal
            closeBtn.addEventListener('click', () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');

                // Detener la actualización para ahorrar recursos cuando está cerrado
                clearInterval(qrInterval);
            });

            // Cerrar modal al hacer click fuera de la caja blanca
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeBtn.click();
                }
            });
        });
    </script>
</body>

</html>
