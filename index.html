<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Procesando...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }
    .box {
      text-align: center;
      padding: 30px;
      border-radius: 12px;
      background: #1e293b;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .spinner {
      margin: 20px auto;
      width: 40px;
      height: 40px;
      border: 4px solid #334155;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .countdown {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
    .username {
      margin-top: 10px;
      font-size: 16px;
      color: #38bdf8;
      font-weight: bold;
    }
  </style>

  <script>
    const TARGET = "https://logise1.github.io";
    let seconds = 10;

    function getUsername() {
      const params = new URLSearchParams(window.location.search);
      return params.get("user") || "Desconocido";
    }

    function updateCountdown() {
      document.getElementById("count").textContent = seconds;
      seconds--;

      if (seconds < 0) {
        redirect();
      }
    }

    function redirect() {
      try {
        if (window.self !== window.top) {
          window.location.replace(TARGET);
        } else {
          window.location.replace(TARGET);
        }
      } catch (e) {
        window.location.href = TARGET;
      }
    }

    window.onload = () => {
      document.getElementById("user").textContent = getUsername();
      setInterval(updateCountdown, 1000);
    };
  </script>
</head>
<body>
  <div class="box">
    <h2>Procesando solicitud...</h2>
    <div class="spinner"></div>

    <div class="username">
      Usuario: <span id="user"></span>
    </div>

    <div class="countdown">
      Redirigiendo en <span id="count">10</span>s...
    </div>

    <p style="margin-top:15px;">
      Si no pasa nada, 
      <a href="https://logise1.github.io" style="color:#38bdf8;">haz clic aquí</a>
    </p>
  </div>
</body>
</html>
