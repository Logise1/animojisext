<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos :)</title>
    <!-- Usamos Tailwind CSS para darle un estilo moderno y bonito rápidamente -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pequeña animación para el botón */
        .hover-scale {
            transition: transform 0.2s ease-in-out;
        }
        .hover-scale:hover {
            transform: translateY(-2px) scale(1.02);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center font-sans antialiased p-4">

    <!-- Contenedor principal -->
    <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-8 w-full max-w-md">
        
        <!-- Título -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">
                Juegos <span class="text-indigo-500">:)</span>
            </h1>
            <p class="text-slate-500 mt-2 text-sm">Selecciona un juego para empezar</p>
        </div>

        <!-- Lista de juegos -->
        <div class="space-y-4">
            
            <!-- Enlace a Factory -->
            <a href="https://logise1.github.io/animojisext/factory.html" 
               class="hover-scale flex items-center justify-center w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold text-lg py-4 px-6 rounded-2xl shadow-md cursor-pointer text-decoration-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Factory
            </a>

        </div>
        
    </div>

</body>
</html>
